<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>🎨 Generador de Paletas</h1>

        <p>
            Generá paletas de colores aleatorias en formato HEX.
        </p>

    </header>

    <main>

        <section class="controles">

            <div class="grupo">

                <label for="cantidad">
                    Cantidad de colores
                </label>

                <select id="cantidad">

                    <option value="6">6 colores</option>
                    <option value="8">8 colores</option>
                    <option value="9">9 colores</option>

                </select>

            </div>

            <button id="btnGenerar">
                Generar Paleta
            </button>

        </section>

        <section id="paleta">

            <!-- Los colores aparecen con JavaScript -->

        </section>

    </main>

    <div id="toast">
        Color copiado ✔
    </div>

    <script src="script.js"></script>

</body>

</html>
